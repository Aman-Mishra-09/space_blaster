services:
  - type: web
    name: space-blaster
    runtime: python
    buildCommand: pip install -r blaster/requirements.txt
    startCommand: cd blaster && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
 